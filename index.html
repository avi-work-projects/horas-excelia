<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Horas Excelia</title>
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#0a0a0f;--surface:#13131a;--surface2:#1a1a24;--surface3:#22222e;
--border:#2a2a38;--border-light:#3a3a4a;
--text:#e8e8f0;--text-muted:#8888a0;--text-dim:#5a5a70;
--accent:#6c8cff;--accent-glow:#6c8cff33;--accent-bright:#8ca8ff;
--sent:#1a3a2a;--sent-border:#2a5a3a;--sent-text:#5ae088;
--festivo:#ff6b6b;--vacaciones:#ffb347;--ausencia:#c084fc;--normal:#6c8cff;
--radius:14px;--radius-sm:10px;
--font:'DM Sans',sans-serif;--mono:'JetBrains Mono',monospace;
}
html{font-size:16px;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100dvh;padding-bottom:env(safe-area-inset-bottom,20px);overflow-x:hidden}

.header{position:sticky;top:0;z-index:50;background:rgba(10,10,15,.92);border-bottom:1px solid var(--border);padding:16px 20px 14px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px}
.header h1{font-size:1.1rem;font-weight:600;letter-spacing:-0.02em}
.header .subtitle{font-size:.75rem;color:var(--text-muted);font-weight:400}
.month-nav{display:flex;align-items:center;gap:6px;margin-top:14px}
.month-nav .month-label{font-size:1.05rem;font-weight:600;min-width:170px;text-align:center;text-transform:capitalize}
.nav-btn{width:40px;height:40px;border-radius:50%;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:1.1rem;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;-webkit-user-select:none;user-select:none}
.nav-btn:active{background:var(--surface3);transform:scale(.93)}
.today-btn{margin-left:auto;font-size:.75rem;font-weight:500;padding:7px 14px;border-radius:20px;border:1px solid var(--accent);background:transparent;color:var(--accent);cursor:pointer;transition:all .15s}
.today-btn:active{background:var(--accent);color:#fff}

.hours-control{display:flex;align-items:center;gap:12px;margin-top:12px}
.hours-label{font-size:.72rem;color:var(--text-muted);font-weight:500;flex-shrink:0}
.hours-chips{display:flex;gap:6px}
.hours-chip{font-family:var(--mono);font-size:.75rem;padding:5px 12px;border-radius:16px;border:1px solid var(--border);background:var(--surface2);color:var(--text-muted);cursor:pointer;transition:all .15s;-webkit-user-select:none;user-select:none}
.hours-chip.active{border-color:var(--accent);background:var(--accent-glow);color:var(--accent-bright)}
.hour-picker{margin-top:16px;padding-top:16px;border-top:1px solid var(--border)}
.hour-picker-label{font-size:.72rem;color:var(--text-muted);margin-bottom:10px;text-align:center}
.hour-chips-row{display:flex;gap:8px;justify-content:center}
.hour-chip-day{font-family:var(--mono);font-size:.85rem;font-weight:500;padding:9px 22px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface2);color:var(--text-muted);cursor:pointer;transition:all .15s;-webkit-user-select:none;user-select:none;flex:1}
.hour-chip-day.active{border-color:var(--accent);background:var(--accent-glow);color:var(--accent-bright)}
.month-summary{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;display:flex;flex-direction:column;gap:10px}
.month-stat{display:flex;align-items:baseline;gap:4px}
.ms-num{font-family:var(--mono);font-size:1.2rem;font-weight:500}
.month-stat.worked .ms-num{color:var(--accent-bright)}
.month-stat.off .ms-num{color:var(--text-muted)}
.ms-label{font-size:.82rem;color:var(--text-muted)}
.ms-hrs{font-family:var(--mono);font-size:.78rem;color:var(--text-dim)}
.data-actions{display:flex;gap:6px;margin-left:auto}
.data-btn{width:34px;height:34px;border-radius:50%;border:1px solid var(--border);background:var(--surface);color:var(--text-muted);font-size:.9rem;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;-webkit-user-select:none;user-select:none}
.data-btn:active{background:var(--surface3);transform:scale(.93)}

.weeks-container{padding:12px 16px 30px;display:flex;flex-direction:column;gap:12px}
.week-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:all .25s}
.week-card.sent{background:var(--sent);border-color:var(--sent-border)}
.week-card.sent .week-header{border-bottom-color:var(--sent-border)}
.week-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 12px;border-bottom:1px solid var(--border)}
.week-info h3{font-size:.88rem;font-weight:600}
.week-info .week-range{font-size:.73rem;color:var(--text-muted);margin-top:2px}
.sent-badge{font-size:.68rem;color:var(--sent-text);font-weight:500;margin-left:8px}
.week-total{font-family:var(--mono);font-size:.82rem;font-weight:500;color:var(--accent-bright);background:var(--accent-glow);padding:4px 10px;border-radius:8px}
.week-card.sent .week-total{color:var(--sent-text);background:#1a3a2a88}

.days-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:1px;background:var(--border)}
.day-cell{background:var(--surface);padding:12px 4px 14px;text-align:center;cursor:pointer;transition:all .12s;-webkit-user-select:none;user-select:none;position:relative}
.day-cell:active{background:var(--surface3)}
.week-card.sent .day-cell{background:var(--sent)}
.day-name{font-size:.68rem;font-weight:500;color:var(--text-muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
.day-date{font-size:.72rem;color:var(--text-dim);margin-bottom:6px}
.day-hours{font-family:var(--mono);font-size:1.05rem;font-weight:500;color:var(--text)}
.day-cell.festivo .day-hours{color:var(--festivo)}
.day-cell.festivo::after{content:'Festivo';font-size:.58rem;color:var(--festivo);display:block;margin-top:2px}
.day-cell.vacaciones .day-hours{color:var(--vacaciones)}
.day-cell.vacaciones::after{content:'Vac.';font-size:.58rem;color:var(--vacaciones);display:block;margin-top:2px}
.day-cell.ausencia .day-hours{color:var(--ausencia)}
.day-cell.ausencia::after{content:'Ausencia';font-size:.58rem;color:var(--ausencia);display:block;margin-top:2px}
.day-status-dot{width:5px;height:5px;border-radius:50%;position:absolute;top:6px;right:6px}
.day-cell.festivo .day-status-dot{background:var(--festivo)}
.day-cell.vacaciones .day-status-dot{background:var(--vacaciones)}
.day-cell.ausencia .day-status-dot{background:var(--ausencia)}

.week-actions{display:flex;gap:6px;padding:10px 12px}
.action-btn{flex:1;padding:12px 6px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:var(--font);font-size:.74rem;font-weight:500;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:5px;-webkit-user-select:none;user-select:none;white-space:nowrap}
.action-btn:active{transform:scale(.97)}
.action-btn.send{background:linear-gradient(135deg,#1a2a4a,#1a3a5a);border-color:#2a4a6a;color:#6cb8ff}
.action-btn.send:active{background:#1a4a6a}
.action-btn.sent-toggle{border-color:var(--sent-border);color:var(--sent-text)}
.week-card.sent .action-btn.sent-toggle{background:var(--sent-border);color:#fff}

.overlay{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.55);opacity:0;pointer-events:none;transition:opacity .2s}
.overlay.active{opacity:1;pointer-events:auto}
.bottom-sheet{position:fixed;bottom:0;left:0;right:0;z-index:101;background:var(--surface);border-top-left-radius:20px;border-top-right-radius:20px;padding:8px 20px 30px;padding-bottom:calc(30px + env(safe-area-inset-bottom,0px));transform:translateY(100%);transition:transform .28s cubic-bezier(.32,.72,0,1)}
.bottom-sheet.active{transform:translateY(0)}
.sheet-handle{width:36px;height:4px;border-radius:2px;background:var(--border-light);margin:0 auto 18px}
.sheet-title{font-size:.92rem;font-weight:600;margin-bottom:4px;text-align:center}
.sheet-subtitle{font-size:.75rem;color:var(--text-muted);text-align:center;margin-bottom:18px}
.sheet-options{display:flex;flex-direction:column;gap:8px}
.sheet-option{display:flex;align-items:center;gap:14px;padding:14px 16px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface2);cursor:pointer;transition:all .12s;-webkit-user-select:none;user-select:none}
.sheet-option:active{background:var(--surface3);transform:scale(.98)}
.sheet-option.selected{border-color:var(--accent);background:var(--accent-glow)}
.option-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.option-dot.normal{background:var(--normal)}
.option-dot.festivo{background:var(--festivo)}
.option-dot.vacaciones{background:var(--vacaciones)}
.option-dot.ausencia{background:var(--ausencia)}
.option-info{flex:1}
.option-label{font-size:.85rem;font-weight:500}
.option-desc{font-size:.7rem;color:var(--text-muted);margin-top:1px}
.option-hours{font-family:var(--mono);font-size:.82rem;color:var(--text-muted)}

.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface3);color:var(--text);padding:10px 20px;border-radius:20px;font-size:.8rem;font-weight:500;opacity:0;transition:all .3s;pointer-events:none;z-index:200;border:1px solid var(--border-light);max-width:90vw;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.error{border-color:#5a2a2a;background:#2a1a1a;color:var(--festivo)}
.toast.success{border-color:var(--sent-border);background:var(--sent);color:var(--sent-text)}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.week-card{animation:fadeUp .35s ease both}
.week-card:nth-child(2){animation-delay:.04s}
.week-card:nth-child(3){animation-delay:.08s}
.week-card:nth-child(4){animation-delay:.12s}
.week-card:nth-child(5){animation-delay:.16s}
.week-card:nth-child(6){animation-delay:.20s}
.build-badge{position:fixed;bottom:10px;right:10px;z-index:999;display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:.6rem;color:var(--text-dim);opacity:.7}
.build-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <h1>Horas Excelia</h1>
      <div class="subtitle">{{AUTHOR_NAME}}</div>
    </div>
    <div class="data-actions">
      <button class="data-btn" id="exportBtn" title="Exportar datos">&#8595;</button>
      <button class="data-btn" id="importBtn" title="Importar datos">&#8593;</button>
      <input type="file" id="importFile" accept=".json" style="display:none">
    </div>
  </div>
  <div class="month-nav">
    <button class="nav-btn" id="prevMonth">&#9664;</button>
    <div class="month-label" id="monthLabel"></div>
    <button class="nav-btn" id="nextMonth">&#9654;</button>
    <button class="today-btn" id="todayBtn">Hoy</button>
  </div>
  <div class="hours-control" id="hoursControl">
    <span class="hours-label">Jornada</span>
    <div class="hours-chips">
      <button class="hours-chip" data-h="7">7h</button>
      <button class="hours-chip" data-h="8">8h</button>
      <button class="hours-chip" data-h="9">9h</button>
    </div>
  </div>
</div>

<div class="weeks-container" id="weeksContainer"></div>

<div class="overlay" id="overlay"></div>
<div class="bottom-sheet" id="bottomSheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title" id="sheetTitle"></div>
  <div class="sheet-subtitle" id="sheetSubtitle"></div>
  <div class="sheet-options">
    <div class="sheet-option" data-type="normal"><div class="option-dot normal"></div><div class="option-info"><div class="option-label">Normal</div><div class="option-desc">D&#237;a de trabajo habitual</div></div><div class="option-hours" id="optNormalHours">9h</div></div>
    <div class="sheet-option" data-type="festivo"><div class="option-dot festivo"></div><div class="option-info"><div class="option-label">Festivo</div><div class="option-desc">D&#237;a festivo oficial</div></div></div>
    <div class="sheet-option" data-type="vacaciones"><div class="option-dot vacaciones"></div><div class="option-info"><div class="option-label">Vacaciones</div><div class="option-desc">D&#237;a de vacaciones</div></div></div>
    <div class="sheet-option" data-type="ausencia"><div class="option-dot ausencia"></div><div class="option-info"><div class="option-label">Baja / Ausencia</div><div class="option-desc">Baja m&#233;dica u otra ausencia</div></div></div>
  </div>
  <div class="hour-picker" id="hourPicker" style="display:none">
    <div class="hour-picker-label">Horas este d&#237;a</div>
    <div class="hour-chips-row">
      <button class="hour-chip-day" data-h="7">7h</button>
      <button class="hour-chip-day" data-h="8">8h</button>
      <button class="hour-chip-day" data-h="9">9h</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<div class="build-badge" id="buildBadge"></div>

<script>
(function(){

// ============================================================
// CONFIG
// ============================================================
var BUILD   = { date: '06/03/2026', color: '#5ae088' };
var TO          = '{{TO}}';
var CC          = '{{CC}}'.split(',');
var AUTHOR_NAME = '{{AUTHOR_NAME}}';

// ============================================================
// SEND EMAIL via mailto:
// ============================================================
function sendEmail(wkey) {
  var wd      = getWD(wkey);
  var body    = buildMailtoBody(wd);
  var subject = 'HORAS Y DIAS TRABAJADOS - ' + AUTHOR_NAME + ' - Semana del ' + fd(wd.mon) + ' al ' + fd(wd.fri);
  var url  = 'mailto:' + TO
    + '?cc='      + encodeURIComponent(CC.join(','))
    + '&subject=' + encodeURIComponent(subject)
    + '&body='    + encodeURIComponent(body);
  window.location.href = url;
  SW[wkey] = true; save(); render();
  showToast('Abriendo Outlook\u2026 recuerda pulsar Enviar', 'success');
}

function buildMailtoBody(wd) {
  var DN = ['L','M','X','J','V'];
  var total = 0;
  wd.proy.forEach(function(h){ if(h) total += parseFloat(h); });
  var totalStr = (total % 1 === 0 ? String(total) : total.toFixed(1)).replace('.', ',');
  var semana = 'Semana del ' + fd(wd.mon) + ' al ' + fd(wd.fri);

  var body = 'Buenos d\u00edas!\n\n' + semana + ':\n\n';
  for (var i = 0; i < 5; i++) {
    var d = ad(wd.mon, i);
    var label;
    if      (wd.fest[i]) label = 'Festivo';
    else if (wd.vac[i])  label = 'Vacaciones';
    else if (wd.aus[i])  label = 'Ausencia';
    else                 label = (wd.proy[i] ? wd.proy[i].replace('.', ',') + 'h' : '\u2014');
    body += DN[i] + ' ' + fd(d) + ' \u2014 ' + label + '\n';
  }
  body += '\nTotal horas trabajadas en proyecto en la ' + semana.toLowerCase() + ':\n';
  body += totalStr + 'h\n\nUn saludo,\n' + AUTHOR_NAME;
  return body;
}

// ============================================================
// APP STATE
// ============================================================
var SK='excelia-horas-v3', CY, CM, ST={}, SW={}, ED=null, GLOBAL_H=9;
var MN=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
var DN=['D','L','M','X','J','V','S'];
var DF=['Domingo','Lunes','Martes','Mi\u00e9rcoles','Jueves','Viernes','S\u00e1bado'];

function load(){ try{var r=localStorage.getItem(SK);if(r){var d=JSON.parse(r);ST=d.days||{};SW=d.sent||{};GLOBAL_H=d.globalH||9;}}catch(e){ST={};SW={};GLOBAL_H=9;} }
function save(){ localStorage.setItem(SK,JSON.stringify({days:ST,sent:SW,globalH:GLOBAL_H})); }
function defH(d){ var w=d.getDay(); if(!w||w===6)return 0; if(w===5)return 6.5; return GLOBAL_H; }
function dayH(d){ var w=d.getDay(); if(!w||w===6)return 0; var k=dk(d),e=ST[k],t=(e&&e.type)||'normal'; if(t!=='normal')return 0; if(w===5)return 6.5; return(e&&e.hours)||GLOBAL_H; }
function dayT(d){ var e=ST[dk(d)]; return(e&&e.type)||'normal'; }
function dk(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function fd(d){ return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0'); }
function ad(d,n){ var r=new Date(d); r.setDate(r.getDate()+n); return r; }
function fh(h){ if(h===0)return'\u2014'; if(h%1===0)return String(h); return h.toFixed(1).replace('.',','); }
function fhP(h){ if(h===0)return''; if(h%1===0)return String(h); return h.toFixed(1); }
function isToday(d){ var t=new Date(); return d.getFullYear()===t.getFullYear()&&d.getMonth()===t.getMonth()&&d.getDate()===t.getDate(); }
function wn(date){ var d=new Date(Date.UTC(date.getFullYear(),date.getMonth(),date.getDate())); d.setUTCDate(d.getUTCDate()+4-(d.getUTCDay()||7)); var ys=new Date(Date.UTC(d.getUTCFullYear(),0,1)); return Math.ceil(((d-ys)/864e5+1)/7); }

function weeks(y,m){
  var ws=[],first=new Date(y,m,1),last=new Date(y,m+1,0),s=new Date(first);
  var dow=s.getDay(),off=dow===0?-6:1-dow; s.setDate(s.getDate()+off);
  while(s<=last||s.getMonth()===m){
    var w=[]; for(var i=0;i<7;i++){w.push(new Date(s));s=ad(s,1);}
    ws.push(w);
    if(s.getMonth()>m&&s.getFullYear()>=y&&m<11)break;
    if(s.getFullYear()>y&&m===11)break;
    if(ws.length>6)break;
  }
  return ws;
}

function getWD(wkey){
  var p=wkey.split('-'),mon=new Date(+p[0],+p[1]-1,+p[2]),days=[];
  for(var i=0;i<5;i++)days.push(ad(mon,i));
  var proy=[],vac=[],fest=[],aus=[];
  for(var i=0;i<5;i++){
    var d=days[i],t=dayT(d);
    if(t==='normal'){var h=dayH(d);proy.push(fhP(h));vac.push('');fest.push('');aus.push('');}
    else{proy.push('');vac.push(t==='vacaciones'?'X':'');fest.push(t==='festivo'?'X':'');aus.push(t==='ausencia'?'X':'');}
  }
  return{mon:mon,fri:days[4],proy:proy,vac:vac,fest:fest,aus:aus};
}

function showToast(msg,type){
  var t=document.getElementById('toast');
  t.textContent=msg;
  t.className='toast show'+(type?' '+type:'');
  clearTimeout(t._timer);
  t._timer=setTimeout(function(){t.className='toast';},3500);
}

// ============================================================
// RENDER
// ============================================================
function render(){
  document.getElementById('monthLabel').textContent=MN[CM]+' '+CY;
  document.querySelectorAll('.hours-chip').forEach(function(el){el.classList.toggle('active',+el.dataset.h===GLOBAL_H);});
  var wks=weeks(CY,CM),c=document.getElementById('weeksContainer');
  c.innerHTML='';

  wks.forEach(function(wk){
    var mon=wk[0],sun=wk[6],wkey=dk(mon),sent=!!SW[wkey],dias=0;
    for(var i=0;i<5;i++){if(dayH(wk[i])>0)dias++;}
    var dStr=dias+(dias===1?' d\u00eda':' d\u00edas');

    var card=document.createElement('div');
    card.className='week-card'+(sent?' sent':'');
    card.innerHTML='<div class="week-header"><div class="week-info"><h3>Semana '+wn(mon)+(sent?'<span class="sent-badge">\u2713 Enviada</span>':'')+'</h3><div class="week-range">'+fd(mon)+' \u2014 '+fd(sun)+'</div></div><div class="week-total">'+dStr+'</div></div>';

    var grid=document.createElement('div'); grid.className='days-grid';
    for(var i=0;i<5;i++){
      var d=wk[i],dt=dayT(d),hrs=dayH(d),inM=d.getMonth()===CM;
      var cell=document.createElement('div');
      cell.className='day-cell'+(dt!=='normal'?' '+dt:'');
      if(!inM)cell.style.opacity='0.4';
      var ts=isToday(d)?'color:var(--accent-bright)':'';
      cell.innerHTML=(dt!=='normal'?'<div class="day-status-dot"></div>':'')+
        '<div class="day-name" style="'+ts+'">'+DN[d.getDay()]+'</div><div class="day-date">'+fd(d)+'</div><div class="day-hours">'+fh(hrs)+'</div>';
      (function(dd){cell.addEventListener('click',function(){openSheet(dd);});})(d);
      grid.appendChild(cell);
    }
    card.appendChild(grid);

    var acts=document.createElement('div'); acts.className='week-actions';

    var sendBtn=document.createElement('button');
    sendBtn.className='action-btn send';
    sendBtn.innerHTML='\u2709 Abrir en Outlook';
    (function(k){sendBtn.addEventListener('click',function(e){e.stopPropagation();sendEmail(k);});})(wkey);

    var sb=document.createElement('button');
    sb.className='action-btn sent-toggle';
    sb.textContent=sent?'\u21a9 Desmarcar':'\u2713 Marcar enviada';
    (function(k){sb.addEventListener('click',function(e){e.stopPropagation();togSent(k);});})(wkey);

    acts.appendChild(sendBtn); acts.appendChild(sb);
    card.appendChild(acts); c.appendChild(card);
  });

  var diasTrabajados=0,horasTotales=0,diasNoLaborables=0;
  wks.forEach(function(wk){
    for(var i=0;i<5;i++){
      var d=wk[i]; if(d.getMonth()!==CM)continue;
      var t=dayT(d),h=dayH(d);
      if(t==='normal'){diasTrabajados++;horasTotales+=h;} else{diasNoLaborables++;}
    }
  });
  var hStr=(horasTotales%1===0?String(horasTotales):horasTotales.toFixed(1).replace('.',','));
  var footer=document.createElement('div'); footer.className='month-summary';
  footer.innerHTML='<div class="month-stat worked"><span class="ms-num">'+diasTrabajados+'</span><span class="ms-label"> d\u00edas trabajados</span><span class="ms-hrs"> ('+hStr+'h)</span></div>'+
    '<div class="month-stat off"><span class="ms-num">'+diasNoLaborables+'</span><span class="ms-label"> d\u00edas no trabajados</span></div>';
  c.appendChild(footer);
}

function openSheet(date){
  ED=date; var dt=dayT(date),dow=date.getDay();
  var nh=(dow===5)?'6,5':String(GLOBAL_H);
  document.getElementById('sheetTitle').textContent=DF[dow]+' '+fd(date);
  document.getElementById('sheetSubtitle').textContent='Selecciona el tipo de d\u00eda';
  document.getElementById('optNormalHours').textContent=nh+'h';
  var opts=document.querySelectorAll('.sheet-option');
  for(var i=0;i<opts.length;i++){opts[i].classList.toggle('selected',opts[i].dataset.type===dt);}
  var picker=document.getElementById('hourPicker');
  if(dow>=1&&dow<=4&&dt==='normal'){
    picker.style.display='block';
    var e=ST[dk(date)];
    var curH=(e&&e.hours)||GLOBAL_H;
    document.querySelectorAll('.hour-chip-day').forEach(function(c){c.classList.toggle('active',+c.dataset.h===curH);});
  } else { picker.style.display='none'; }
  document.getElementById('overlay').classList.add('active');
  document.getElementById('bottomSheet').classList.add('active');
}

function closeSheet(){
  document.getElementById('overlay').classList.remove('active');
  document.getElementById('bottomSheet').classList.remove('active');
  ED=null;
}

function selectType(t){
  if(!ED)return; var k=dk(ED),dow=ED.getDay();
  if(t==='normal'){
    var e=ST[k]||{},wasNormal=!e.type;
    if(!wasNormal){delete ST[k];e={};}
    document.querySelectorAll('.sheet-option').forEach(function(el){el.classList.toggle('selected',el.dataset.type==='normal');});
    if(dow>=1&&dow<=4){
      var picker=document.getElementById('hourPicker');
      picker.style.display='block';
      var curH=(ST[k]&&ST[k].hours)||GLOBAL_H;
      document.querySelectorAll('.hour-chip-day').forEach(function(c){c.classList.toggle('active',+c.dataset.h===curH);});
    }
    save(); render();
  } else {
    delete ST[k]; ST[k]={type:t};
    save(); closeSheet(); render();
  }
}

function togSent(k){ if(SW[k])delete SW[k]; else SW[k]=true; save(); render(); }

// ============================================================
// EVENT LISTENERS
// ============================================================
document.querySelectorAll('.sheet-option').forEach(function(el){el.addEventListener('click',function(){selectType(el.dataset.type);});});
document.querySelectorAll('.hour-chip-day').forEach(function(el){
  el.addEventListener('click',function(){
    if(!ED)return; var k=dk(ED),h=+el.dataset.h;
    if(!ST[k])ST[k]={};
    if(h===GLOBAL_H)delete ST[k].hours; else ST[k].hours=h;
    if(Object.keys(ST[k]).length===0)delete ST[k];
    save(); closeSheet(); render();
  });
});
document.querySelectorAll('.hours-chip').forEach(function(el){
  el.addEventListener('click',function(){GLOBAL_H=+el.dataset.h;save();render();});
});
document.getElementById('exportBtn').addEventListener('click',function(){
  var data=JSON.stringify({version:1,days:ST,sent:SW,globalH:GLOBAL_H},null,2);
  var a=document.createElement('a');
  a.href='data:application/json,'+encodeURIComponent(data);
  a.download='horas-excelia-backup.json';
  a.click();
});
document.getElementById('importBtn').addEventListener('click',function(){document.getElementById('importFile').click();});
document.getElementById('importFile').addEventListener('change',function(e){
  var f=e.target.files[0]; if(!f)return;
  var r=new FileReader();
  r.onload=function(ev){
    try{
      var d=JSON.parse(ev.target.result);
      ST=d.days||{}; SW=d.sent||{}; GLOBAL_H=d.globalH||9;
      save(); render();
      showToast('Datos importados correctamente','success');
    }catch(err){ showToast('Error al importar el fichero','error'); }
  };
  r.readAsText(f);
});
document.getElementById('overlay').addEventListener('click',closeSheet);
document.getElementById('prevMonth').addEventListener('click',function(){CM--;if(CM<0){CM=11;CY--;}render();});
document.getElementById('nextMonth').addEventListener('click',function(){CM++;if(CM>11){CM=0;CY++;}render();});
document.getElementById('todayBtn').addEventListener('click',function(){var n=new Date();CY=n.getFullYear();CM=n.getMonth();render();});

// ============================================================
// INIT
// ============================================================
load();
var now=new Date(); CY=now.getFullYear(); CM=now.getMonth();
render();

(function(){
  var b=document.getElementById('buildBadge');
  var dot=document.createElement('div'); dot.className='build-dot'; dot.style.background=BUILD.color;
  b.appendChild(dot); b.appendChild(document.createTextNode(BUILD.date));
})();

})();
</script>
</body>
