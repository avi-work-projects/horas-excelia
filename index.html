<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Horas Excelia</title>
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* Mantenemos tu CSS exacto de la interfaz oscura */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#0a0a0f;--surface:#13131a;--surface2:#1a1a24;--surface3:#22222e;
--border:#2a2a38;--border-light:#3a3a4a;
--text:#e8e8f0;--text-muted:#8888a0;--text-dim:#5a5a70;
--accent:#6c8cff;--accent-glow:#6c8cff33;--accent-bright:#8ca8ff;
--sent:#1a3a2a;--sent-border:#2a5a3a;--sent-text:#5ae088;
--festivo:#ff6b6b;--vacaciones:#ffb347;--ausencia:#c084fc;--normal:#6c8cff;
--radius:14px;--radius-sm:10px;
--font:'DM Sans',sans-serif;--mono:'JetBrains Mono',monospace;
}
html{font-size:16px;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100dvh;padding-bottom:env(safe-area-inset-bottom,20px);overflow-x:hidden}
.header{position:sticky;top:0;z-index:50;background:rgba(10,10,15,.92);border-bottom:1px solid var(--border);padding:16px 20px 14px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px}
.header h1{font-size:1.1rem;font-weight:600;letter-spacing:-0.02em}
.header .subtitle{font-size:.75rem;color:var(--text-muted);font-weight:400}
.user-badge{display:flex;align-items:center;gap:6px;font-size:.7rem;color:var(--text-muted);background:var(--surface2);padding:4px 10px;border-radius:12px;border:1px solid var(--border)}
.month-nav{display:flex;align-items:center;gap:6px;margin-top:14px}
.month-nav .month-label{font-size:1.05rem;font-weight:600;min-width:170px;text-align:center;text-transform:capitalize}
.nav-btn{width:40px;height:40px;border-radius:50%;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:1.1rem;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;-webkit-user-select:none;user-select:none}
.nav-btn:active{background:var(--surface3);transform:scale(.93)}
.today-btn{margin-left:auto;font-size:.75rem;font-weight:500;padding:7px 14px;border-radius:20px;border:1px solid var(--accent);background:transparent;color:var(--accent);cursor:pointer;transition:all .15s}
.summer-banner{margin:12px 16px 0;padding:10px 14px;border-radius:var(--radius-sm);background:linear-gradient(135deg,#2a1a0a,#1a2a1a);border:1px solid #4a3a1a;font-size:.78rem;color:#ffb347;display:flex;align-items:center;gap:8px}
.weeks-container{padding:12px 16px 30px;display:flex;flex-direction:column;gap:12px}
.week-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:all .25s}
.week-card.sent{background:var(--sent);border-color:var(--sent-border)}
.week-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 12px;border-bottom:1px solid var(--border)}
.week-info h3{font-size:.88rem;font-weight:600}
.week-range{font-size:.73rem;color:var(--text-muted)}
.week-total{font-family:var(--mono);font-size:.82rem;font-weight:500;color:var(--accent-bright);background:var(--accent-glow);padding:4px 10px;border-radius:8px}
.days-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:1px;background:var(--border)}
.day-cell{background:var(--surface);padding:12px 4px 14px;text-align:center;position:relative}
.day-name{font-size:.68rem;color:var(--text-muted);margin-bottom:4px}
.day-hours{font-family:var(--mono);font-size:1.05rem;color:var(--text)}
.day-cell.festivo .day-hours{color:var(--festivo)}
.day-cell.vacaciones .day-hours{color:var(--vacaciones)}
.day-cell.ausencia .day-hours{color:var(--ausencia)}
.week-actions{display:flex;gap:6px;padding:10px 12px}
.action-btn{flex:1;padding:12px 6px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:.74rem;font-weight:500;cursor:pointer}
.action-btn.send{background:linear-gradient(135deg,#1a2a4a,#1a3a5a);color:#6cb8ff;border-color:#2a4a6a}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);opacity:0;pointer-events:none;transition:opacity .2s;z-index:100}
.overlay.active{opacity:1;pointer-events:auto}
.bottom-sheet{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top-left-radius:20px;border-top-right-radius:20px;padding:8px 20px 30px;transform:translateY(100%);transition:transform .28s;z-index:101}
.bottom-sheet.active{transform:translateY(0)}
.sheet-handle{width:36px;height:4px;background:var(--border-light);margin:0 auto 18px;border-radius:2px}
.sheet-option{display:flex;align-items:center;gap:14px;padding:14px 16px;border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:8px}
.sheet-option.selected{border-color:var(--accent);background:var(--accent-glow)}
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--surface3);padding:10px 20px;border-radius:20px;font-size:.8rem;opacity:0;transition:opacity .3s;z-index:200;border:1px solid var(--border-light)}
.toast.show{opacity:1}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <h1>Horas Excelia</h1>
      <div class="subtitle">Angel Villazon Iglesias</div>
    </div>
    <div class="user-badge" id="userBadge">
      <span>App Lista</span>
    </div>
  </div>
  <div class="month-nav">
    <button class="nav-btn" id="prevMonth">&#9664;</button>
    <div class="month-label" id="monthLabel"></div>
    <button class="nav-btn" id="nextMonth">&#9654;</button>
    <button class="today-btn" id="todayBtn">Hoy</button>
  </div>
</div>

<div id="summerBanner" class="summer-banner" style="display:none">
  <span>&#9728;&#65039;</span>
  <span>Horario de verano activo: L-J = 7h, V = 6.5h</span>
</div>

<div class="weeks-container" id="weeksContainer"></div>

<div class="overlay" id="overlay"></div>
<div class="bottom-sheet" id="bottomSheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title" id="sheetTitle" style="text-align:center; margin-bottom:10px; font-weight:600"></div>
  <div class="sheet-options">
    <div class="sheet-option" data-type="normal">Normal</div>
    <div class="sheet-option" data-type="festivo">Festivo</div>
    <div class="sheet-option" data-type="vacaciones">Vacaciones</div>
    <div class="sheet-option" data-type="ausencia">Baja / Ausencia</div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
(function(){
// Configuración de destino
var TO = 'mamoreno@excelia.com';
var CC = 'apose@excelia.com;jgallego@excelia.com';
var SUBJECT = 'HORAS Y DÍAS DE TRABAJO - Angel Villazon Iglesias';

var SK='excelia-horas-v3',CY,CM,ST={},SW={},ED=null;
var MN=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

function load(){try{var r=localStorage.getItem(SK);if(r){var d=JSON.parse(r);ST=d.days||{};SW=d.sent||{};}}catch(e){}}
function save(){localStorage.setItem(SK,JSON.stringify({days:ST,sent:SW}));}
function summer(d){var m=d.getMonth(),dd=d.getDate();return m===6||m===7||(m===8&&dd<=15);}
function mSummer(m){return m===6||m===7||m===8;}
function defH(d){var w=d.getDay();if(!w||w===6)return 0;if(w===5)return 6.5;return summer(d)?7:9;}
function dayH(d){var k=dk(d),t=(ST[k]&&ST[k].type)||'normal',w=d.getDay();if(!w||w===6)return 0;if(t!=='normal')return 8;return defH(d);}
function dayT(d){return (ST[dk(d)] && ST[dk(d)].type) || 'normal';}
function dk(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function fd(d){return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0');}
function ad(d,n){var r=new Date(d);r.setDate(r.getDate()+n);return r;}

// Función mágica para abrir Outlook
function openOutlook(wkey) {
    var parts = wkey.split('-');
    var mon = new Date(parts[0], parts[1]-1, parts[2]);
    var fri = ad(mon, 4);
    
    var body = "Hola,\n\nAdjunto desglose de horas de la semana del " + fd(mon) + " al " + fd(fri) + ":\n\n";
    var total = 0;
    
    for(var i=0; i<5; i++) {
        var d = ad(mon, i);
        var h = dayH(d);
        var t = dayT(d);
        total += h;
        var label = t !== 'normal' ? " (" + t.toUpperCase() + ")" : "";
        body += "- " + fd(d) + ": " + h.toString().replace('.',',') + "h" + label + "\n";
    }
    body += "\nTotal semana: " + total.toString().replace('.',',') + "h\n\nUn saludo.";

    // El truco del mailto para Android/Vivo
    var mailtoUrl = "mailto:" + TO + "?cc=" + CC + "&subject=" + encodeURIComponent(SUBJECT) + "&body=" + encodeURIComponent(body);
    window.location.href = mailtoUrl;
    
    SW[wkey] = true; save(); render();
    showToast("Abriendo Outlook...");
}

function render(){
  document.getElementById('monthLabel').textContent=MN[CM]+' '+CY;
  document.getElementById('summerBanner').style.display=mSummer(CM)?'flex':'none';
  var c=document.getElementById('weeksContainer'); c.innerHTML='';
  
  // Lógica de semanas (simplificada para el ejemplo)
  var first=new Date(CY,CM,1);
  var start=ad(first, first.getDay()===0?-6:1-first.getDay());
  
  for(var i=0; i<5; i++) {
    var wk = ad(start, i*7);
    var wkey = dk(wk);
    var sent = SW[wkey];
    var card = document.createElement('div');
    card.className = 'week-card' + (sent?' sent':'');
    
    var total = 0;
    for(var j=0; j<5; j++) total += dayH(ad(wk, j));

    card.innerHTML = `
      <div class="week-header">
        <div class="week-info"><h3>Semana ${fd(wk)}</h3><div class="week-range">${fd(wk)} - ${fd(ad(wk,6))}</div></div>
        <div class="week-total">${total.toString().replace('.',',')}h</div>
      </div>
      <div class="days-grid"></div>
      <div class="week-actions">
        <button class="action-btn send">✉ Abrir Outlook</button>
        <button class="action-btn toggle">${sent?'↩ Desmarcar':'✓ Hecho'}</button>
      </div>
    `;
    
    var grid = card.querySelector('.days-grid');
    for(var j=0; j<5; j++) {
        var d = ad(wk, j);
        var cell = document.createElement('div');
        cell.className = 'day-cell ' + dayT(d);
        cell.innerHTML = `<div class="day-name">${['L','M','X','J','V'][j]}</div><div class="day-hours">${dayH(d)}</div>`;
        (function(targetDate){ cell.onclick = () => openSheet(targetDate); })(d);
        grid.appendChild(cell);
    }

    card.querySelector('.send').onclick = () => openOutlook(wkey);
    card.querySelector('.toggle').onclick = () => { SW[wkey]=!SW[wkey]; save(); render(); };
    c.appendChild(card);
  }
}

function openSheet(d){
  ED=d; document.getElementById('sheetTitle').textContent = fd(d);
  document.getElementById('overlay').classList.add('active');
  document.getElementById('bottomSheet').classList.add('active');
}

function closeSheet(){
  document.getElementById('overlay').classList.remove('active');
  document.getElementById('bottomSheet').classList.remove('active');
}

document.querySelectorAll('.sheet-option').forEach(opt => {
  opt.onclick = () => { ST[dk(ED)] = {type: opt.dataset.type}; save(); closeSheet(); render(); };
});

document.getElementById('overlay').onclick = closeSheet;
document.getElementById('prevMonth').onclick = () => { CM--; if(CM<0){CM=11;CY--;} render(); };
document.getElementById('nextMonth').onclick = () => { CM++; if(CM>11){CM=0;CY++;} render(); };
document.getElementById('todayBtn').onclick = () => { var n=new Date(); CY=n.getFullYear(); CM=n.getMonth(); render(); };

function showToast(m){ 
  var t=document.getElementById('toast'); t.textContent=m; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2000);
}

load(); var now=new Date(); CY=now.getFullYear(); CM=now.getMonth(); render();
})();
</script>
</body>
</html>
