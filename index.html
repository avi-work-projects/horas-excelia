<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horas Excelia - Ángel Villazón</title>
    <style>
        :root {
            --primary: #005A9C; /* Azul corporativo típico */
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #333;
            --border-color: #e0e0e0;
            --summer-color: #f39c12;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 15px;
            box-sizing: border-box;
        }

        /* Header & Navegación */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card-bg);
            padding: 15px 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }

        .header button {
            background: none;
            border: none;
            font-size: 1.5rem;
            color: var(--primary);
            cursor: pointer;
            padding: 5px 10px;
        }

        .header h2 { margin: 0; font-size: 1.2rem; text-transform: capitalize; }

        .summer-notice {
            background: #fff3e0;
            color: #d35400;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            font-size: 0.9rem;
            font-weight: bold;
            margin-bottom: 20px;
            display: none; /* Se activa por JS */
        }

        /* Tarjetas de Semanas */
        .week-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }

        .week-card.sent {
            border-color: #27ae60;
            background-color: #f9fffb;
        }

        .week-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }

        .week-header h3 { margin: 0; font-size: 1.1rem; color: var(--primary); }

        .sent-badge {
            background: #27ae60;
            color: white;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.8rem;
            display: none;
        }
        
        .week-card.sent .sent-badge { display: inline-block; }

        /* Días */
        .day-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px dashed var(--border-color);
            cursor: pointer;
        }

        .day-row:last-child { border-bottom: none; }

        .day-info { display: flex; flex-direction: column; }
        .day-date { font-weight: bold; font-size: 1rem; }
        .day-status { font-size: 0.8rem; color: #666; margin-top: 2px; }
        
        .day-hours {
            background: var(--bg-color);
            padding: 5px 10px;
            border-radius: 8px;
            font-weight: bold;
            color: var(--primary);
        }

        /* Botones de acción */
        .actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
        }

        .btn-outlook { background: var(--primary); color: white; }
        .btn-mark { background: #e0e0e0; color: #333; }
        .week-card.sent .btn-mark { background: #e74c3c; color: white; }

        /* Modal */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none; justify-content: center; align-items: flex-end;
            z-index: 1000;
        }

        .modal {
            background: white;
            width: 100%;
            border-radius: 20px 20px 0 0;
            padding: 20px;
            box-sizing: border-box;
            transform: translateY(100%);
            transition: transform 0.3s ease;
        }

        .modal.open { transform: translateY(0); }
        .modal h3 { margin-top: 0; text-align: center; }

        .status-btn {
            width: 100%; padding: 15px; margin-bottom: 10px;
            border: 1px solid var(--border-color);
            border-radius: 10px; background: white;
            font-size: 1rem; cursor: pointer;
        }

        .status-btn.active { border-color: var(--primary); background: #e6f0fa; font-weight: bold; }
        .close-modal { width: 100%; padding: 15px; border: none; background: #333; color: white; border-radius: 10px; font-size: 1rem; cursor: pointer; margin-top: 10px; }

    </style>
</head>
<body>

<div class="container">
    <div class="summer-notice" id="summerNotice">☀️ Horario de verano activo (L-J: 7h, V: 6.5h)</div>

    <div class="header">
        <button onclick="changeMonth(-1)">&#8592;</button>
        <h2 id="monthTitle">Mes Año</h2>
        <button onclick="changeMonth(1)">&#8594;</button>
    </div>

    <div id="weeksContainer">
        </div>
</div>

<div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="statusModal">
        <h3 id="modalDateTitle">Editar Día</h3>
        <button class="status-btn" data-status="Normal" onclick="setStatus('Normal')">Normal</button>
        <button class="status-btn" data-status="Festivo" onclick="setStatus('Festivo')">Festivo (8h)</button>
        <button class="status-btn" data-status="Vacaciones" onclick="setStatus('Vacaciones')">Vacaciones (8h)</button>
        <button class="status-btn" data-status="Baja-Ausencia" onclick="setStatus('Baja-Ausencia')">Baja / Ausencia (8h)</button>
        <button class="close-modal" onclick="closeModal()">Cancelar</button>
    </div>
</div>

<script>
    // ESTADO DE LA APP
    let currentDate = new Date();
    let appData = JSON.parse(localStorage.getItem('excelia_data')) || { days: {}, sentWeeks: [] };
    let selectedDateStr = null;

    const dayNames = ["Dom", "Lun", "Mar", "Mié", "Jue", "Vie", "Sáb"];
    const monthNames = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];

    // LÓGICA DE NEGOCIO
    function isSummer(date) {
        const m = date.getMonth(); // 0-11
        const d = date.getDate();
        if (m === 6 || m === 7) return true; // Julio y Agosto enteros
        if (m === 8 && d <= 15) return true; // Hasta 15 de Septiembre
        return false;
    }

    function getDayDetails(date) {
        const dateStr = date.toISOString().split('T')[0];
        const status = appData.days[dateStr] || 'Normal';
        const dayOfWeek = date.getDay(); // 0: Dom, 1-4: L-J, 5: Vie, 6: Sab
        
        let hours = 0;

        if (dayOfWeek === 0 || dayOfWeek === 6) {
            return { hours: 0, status: 'Fin de semana', isWorkday: false };
        }

        if (status !== 'Normal') {
            hours = 8; // Festivo, Vacaciones o Baja
        } else {
            const summer = isSummer(date);
            if (dayOfWeek >= 1 && dayOfWeek <= 4) {
                hours = summer ? 7 : 9; // Lunes a Jueves
            } else if (dayOfWeek === 5) {
                hours = 6.5; // Viernes
            }
        }
        return { hours, status, isWorkday: true, dateStr };
    }

    // RENDERIZADO
    function renderApp() {
        // Título del mes
        document.getElementById('monthTitle').innerText = `${monthNames[currentDate.getMonth()]} ${currentDate.getFullYear()}`;
        
        // Aviso de verano (comprobamos si el 1 o el 15 del mes actual caen en verano para mostrar el aviso general)
        const checkSummer1 = new Date(currentDate.getFullYear(), currentDate.getMonth(), 1);
        const checkSummer15 = new Date(currentDate.getFullYear(), currentDate.getMonth(), 15);
        document.getElementById('summerNotice').style.display = (isSummer(checkSummer1) || isSummer(checkSummer15)) ? 'block' : 'none';

        const container = document.getElementById('weeksContainer');
        container.innerHTML = '';

        const weeks = getWeeksInMonth(currentDate.getFullYear(), currentDate.getMonth());

        weeks.forEach((week, index) => {
            const weekId = `${currentDate.getFullYear()}-${currentDate.getMonth()}-W${index}`;
            const isSent = appData.sentWeeks.includes(weekId);
            
            // Filtrar solo L-V para la vista
            const workDays = week.filter(d => d.getDay() !== 0 && d.getDay() !== 6);
            if(workDays.length === 0) return;

            const weekStartDate = workDays[0].toLocaleDateString('es-ES', {day:'2-digit', month:'2-digit'});
            const weekEndDate = workDays[workDays.length-1].toLocaleDateString('es-ES', {day:'2-digit', month:'2-digit'});

            const card = document.createElement('div');
            card.className = `week-card ${isSent ? 'sent' : ''}`;
            
            let html = `
                <div class="week-header">
                    <h3>Semana ${weekStartDate} - ${weekEndDate}</h3>
                    <span class="sent-badge">✓ Enviada</span>
                </div>
                <div class="days-list">
            `;

            let totalHours = 0;

            workDays.forEach(day => {
                const details = getDayDetails(day);
                totalHours += details.hours;
                html += `
                    <div class="day-row" onclick="openModal('${details.dateStr}', '${details.status}', '${dayNames[day.getDay()]} ${day.getDate()}')">
                        <div class="day-info">
                            <span class="day-date">${dayNames[day.getDay()]} ${day.getDate()}</span>
                            <span class="day-status">${details.status}</span>
                        </div>
                        <span class="day-hours">${details.hours}h</span>
                    </div>
                `;
            });

            html += `
                </div>
                <div style="text-align: right; margin-top: 10px; font-weight: bold; color: var(--primary);">
                    Total: ${totalHours}h
                </div>
                <div class="actions">
                    <button class="btn btn-mark" onclick="toggleSent('${weekId}')">${isSent ? 'Desmarcar' : 'Marcar Enviada'}</button>
                    <button class="btn btn-outlook" onclick="openOutlook('${weekId}')">Abrir en Outlook</button>
                </div>
            `;
            
            card.innerHTML = html;
            // Guardamos la info de la semana en el botón de outlook a través de un atributo data (hack rápido)
            card.querySelector('.btn-outlook').dataset.days = JSON.stringify(workDays.map(d => d.toISOString()));
            container.appendChild(card);
        });
    }

    // UTILIDADES DE FECHAS
    function getWeeksInMonth(year, month) {
        const weeks = [];
        let d = new Date(year, month, 1);
        
        // Retroceder al lunes
        let day = d.getDay();
        let diff = d.getDate() - day + (day === 0 ? -6 : 1); 
        d = new Date(d.setDate(diff));

        while (d.getMonth() <= month && (d.getMonth() === month || weeks.length < 6)) {
            if(d.getFullYear() > year) break;
            const week = [];
            for (let i = 0; i < 7; i++) {
                week.push(new Date(d));
                d.setDate(d.getDate() + 1);
            }
            // Solo añadir si al menos un día pertenece al mes actual
            if(week.some(wd => wd.getMonth() === month)) {
                weeks.push(week);
            }
        }
        return weeks;
    }

    function changeMonth(delta) {
        currentDate.setMonth(currentDate.getMonth() + delta);
        renderApp();
    }

    // MODAL Y ESTADOS
    function openModal(dateStr, currentStatus, dateLabel) {
        selectedDateStr = dateStr;
        document.getElementById('modalDateTitle').innerText = dateLabel;
        
        document.querySelectorAll('.status-btn').forEach(btn => {
            btn.classList.remove('active');
            if(btn.dataset.status === currentStatus) btn.classList.add('active');
        });

        document.getElementById('modalOverlay').style.display = 'flex';
        setTimeout(() => document.getElementById('statusModal').classList.add('open'), 10);
    }

    function closeModal() {
        document.getElementById('statusModal').classList.remove('open');
        setTimeout(() => document.getElementById('modalOverlay').style.display = 'none', 300);
    }

    function setStatus(status) {
        if(status === 'Normal') {
            delete appData.days[selectedDateStr]; // Si es normal, borramos para ahorrar espacio
        } else {
            appData.days[selectedDateStr] = status;
        }
        saveData();
        closeModal();
        renderApp();
    }

    function toggleSent(weekId) {
        const index = appData.sentWeeks.indexOf(weekId);
        if (index > -1) {
            appData.sentWeeks.splice(index, 1);
        } else {
            appData.sentWeeks.push(weekId);
        }
        saveData();
        renderApp();
    }

    function saveData() {
        localStorage.setItem('excelia_data', JSON.stringify(appData));
    }

    // GENERAR CORREO
    function openOutlook(weekId) {
        // Recuperar los días desde el botón que se clickeó
        const btn = event.target;
        const daysStrs = JSON.parse(btn.dataset.days);
        
        let bodyText = "Hola,\n\nAdjunto el desglose de mis horas y días de trabajo de esta semana:\n\n";
        
        daysStrs.forEach(dStr => {
            const dateObj = new Date(dStr);
            const details = getDayDetails(dateObj);
            const dateFormatted = dateObj.toLocaleDateString('es-ES');
            const dayName = dayNames[dateObj.getDay()];
            
            bodyText += `- ${dateFormatted} (${dayName}): ${details.hours}h`;
            if(details.status !== 'Normal') {
                bodyText += ` [${details.status}]`;
            }
            bodyText += "\n";
        });

        bodyText += "\nUn saludo,\nAngel Villazon Iglesias";

        const to = "mamoreno@excelia.com";
        const cc = "apose@excelia.com;jgallego@excelia.com";
        const subject = "HORAS Y DÍAS DE TRABAJO - Angel Villazon Iglesias";

        const url = `https://outlook.office.com/mail/deeplink/compose?to=${to}&cc=${cc}&subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(bodyText)}`;
        
        // Abrir URL en nueva pestaña/ventana
        window.open(url, '_blank');
        
        // Opcional: Marcar la semana como enviada automáticamente al abrir el correo
        if(!appData.sentWeeks.includes(weekId)) {
            toggleSent(weekId);
        }
    }

    // Inicializar app
    renderApp();

</script>
</body>
</html>
