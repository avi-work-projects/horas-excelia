name: Deploy Horas Excelia

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject secrets
        env:
          MAIL_TO: ${{ secrets.MAIL_TO }}
          MAIL_CC: ${{ secrets.MAIL_CC }}
          AUTHOR_NAME: ${{ secrets.AUTHOR_NAME }}
          BIRTHDAYS: ${{ secrets.BIRTHDAYS }}
        run: |
          python3 - <<'PYEOF'
          import os
          with open('index.html', 'r', encoding='utf-8') as f:
              content = f.read()
          def clean(v): return v.strip().replace('\r','').replace('\n','')
          replacements = {
              '{{TO}}':          clean(os.environ.get('MAIL_TO',      '')),
              '{{CC}}':          clean(os.environ.get('MAIL_CC',      '')),
              '{{AUTHOR_NAME}}': clean(os.environ.get('AUTHOR_NAME',  '')),
              '{{BIRTHDAYS}}':   ''.join(os.environ.get('BIRTHDAYS', '').split()),
          }
          for key, val in replacements.items():
              content = content.replace(key, val)
          with open('index.html', 'w', encoding='utf-8') as f:
              f.write(content)
          PYEOF

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
